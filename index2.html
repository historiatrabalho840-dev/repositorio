<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta charset="UTF-8">
  <title>Estoque de Grupos</title>

  <style>
  body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
  }

  h1 {
    margin: 20px;
  }

  #busca {
    padding: 12px;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    border: none;
    margin-bottom: 20px;
    font-size: 16px;
  }

  #lista {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
    padding: 20px;
  }

  .card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    font-weight: bold;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.2s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  /* 📱 Ajuste extra para celular */
  @media (max-width: 600px) {
    h1 {
      font-size: 22px;
    }

    .card {
      padding: 15px;
      font-size: 14px;
    }
  }
</style>
</head>

<body>

<h1>📦 Estoque de Grupos</h1>
<div id="lista"></div>

<script>
const url = "https://opensheet.elk.sh/1pVCLdpA0xzZhkgbg1Yi3ML3WY8Q3doivVPDBpA25_c4/Sheet1";

function carregarDados() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById("lista");
      lista.innerHTML = ""; // limpa antes de atualizar

      data.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = "Grupo " + (item.GRUPOS || index + 1);
        lista.appendChild(div);
      });
    });
}

// roda uma vez
carregarDados();

// roda automaticamente a cada 5 segundos
setInterval(carregarDados, 5000);
</script>

</body>
</html>
