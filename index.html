<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Estoque de Grupos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      margin: 0;
      text-align: center;
    }

    h1 {
      color: white;
      margin-top: 20px;
    }

<input 
  type="text" 
  id="busca" 
  placeholder="🔎 Buscar grupo..." 
  style="padding:10px; width:250px; border-radius:10px; border:none; margin-top:20px;"
>

    #lista {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 10px;
      width: 120px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<h1>📦 Estoque de Grupos</h1>
<div id="lista"></div>

<script>
const url = "https://opensheet.elk.sh/1pVCLdpA0xzZhkgbg1Yi3ML3WY8Q3doivVPDBpA25_c4/Sheet1";

let dados = [];

function renderizar(listaFiltrada) {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  listaFiltrada.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerText = "Grupo " + (item.GRUPOS || index + 1);

    lista.appendChild(div);
  });
}

function carregarDados() {
  fetch(url)
    .then(res => res.json())
    .then(data => {
      dados = data;
      renderizar(dados);
    });
}

// 🔎 busca em tempo real
document.getElementById("busca").addEventListener("input", function() {
  const texto = this.value.toLowerCase();

  const filtrados = dados.filter((item, index) => {
    const grupo = (item.GRUPOS || index + 1).toString().toLowerCase();
    const cor = (item.COR || "").toLowerCase();

    return grupo.includes(texto) || cor.includes(texto);
  });

  renderizar(filtrados);
});

// carregar inicial
carregarDados();

// atualização automática (opcional)
setInterval(carregarDados, 5000);
</script>

</body>
</html>
